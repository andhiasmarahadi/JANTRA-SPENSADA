<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANTRA v3 - Jurnal, Absensi, Nilai Terintegrasi Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // ==========================================
        // KONFIGURASI APLIKASI
        // ==========================================
        const IS_PREVIEW = false; // Set ke FALSE jika sudah memasukkan GAS_URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzBXxElnH_4OI2g10N8b-mVP1VoE-RJFSkCUA2o9seb07SKL259JjbqsXxyuAAGqE9ilw/exec";

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #334155; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        #loading-screen { background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); display: none; }
        @media print {
            .no-print { display: none !important; }
            #print-area { display: block !important; }
        }
    </style>
</head>
<body class="antialiased overflow-hidden select-none">

    <div id="loading-screen" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-brand-100 border-t-brand-600 rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-slate-700 animate-pulse">Menghubungkan ke Cloud...</p>
    </div>

    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <div id="login-page" class="flex min-h-screen bg-white">
        <div class="hidden md:flex md:w-1/2 flex-col items-center justify-center p-8 bg-white relative">
            <img src="https://i.imghippo.com/files/SQxV3752W.png" alt="Logo JANTRA" class="w-full max-w-2xl max-h-[85vh] object-contain">
            <p class="absolute bottom-8 text-slate-400 text-sm text-center z-10 w-full font-medium">Aplikasi ini dibuat Oleh Andhi Asmara Hadi</p>
        </div>
        <div class="w-full md:w-1/2 flex flex-col items-center justify-center bg-slate-100 p-8">
            <div class="bg-white rounded-3xl shadow-xl p-8 md:p-10 w-full max-w-md border border-slate-200">
                <h2 class="text-3xl font-bold text-slate-800 mb-2 text-center">Cloud Access</h2>
                <p class="text-slate-500 text-sm text-center mb-8">Sistem Terintegrasi SMPN 1 Dawan</p>
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username / NIP</label>
                        <input type="text" id="login-username" required class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="Masukkan NIP">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                        <input type="password" id="login-password" required class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="••••••••">
                    </div>
                    <button type="submit" id="btn-login" class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl shadow-lg text-white bg-brand-600 hover:bg-brand-700 font-bold">
                        Masuk Sistem
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden h-screen flex bg-slate-50 relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col no-print">
            <div class="p-5 m-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-4">
                <img id="sidebar-avatar" src="" class="w-12 h-12 rounded-full shadow-md object-cover">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-slate-800 truncate" id="sidebar-name">User</p>
                    <p class="text-xs font-semibold text-brand-600 uppercase" id="sidebar-role">Role</p>
                </div>
            </div>
            <nav class="flex-1 px-4 py-2 space-y-1.5" id="nav-menu"></nav>
            <div class="p-4 border-t border-slate-100">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-600 rounded-xl hover:bg-red-50">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
        </aside>

        <div class="flex-1 ml-72 flex flex-col h-full overflow-hidden">
            <main id="main-content" class="flex-1 overflow-y-auto p-8">
                <div id="view-user" class="view-section hidden fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Manajemen User</h2>
                        <button onclick="openModalUser()" class="bg-brand-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Tambah User</button>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="px-6 py-4">Foto</th>
                                    <th class="px-6 py-4">NIP</th>
                                    <th class="px-6 py-4">Nama</th>
                                    <th class="px-6 py-4">Role</th>
                                    <th class="px-6 py-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-user"></tbody>
                        </table>
                    </div>
                </div>

                <div id="view-siswa" class="view-section hidden fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Data Master Siswa</h2>
                        <button onclick="openModalSiswa()" class="bg-brand-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Tambah Siswa</button>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="px-6 py-4">NIS</th>
                                    <th class="px-6 py-4">Nama</th>
                                    <th class="px-6 py-4">Kelas</th>
                                    <th class="px-6 py-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-siswa"></tbody>
                        </table>
                    </div>
                </div>

                <div id="view-jurnal" class="view-section hidden fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Jurnal Guru</h2>
                        <button onclick="openModalJurnal()" class="bg-brand-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Input Jurnal</button>
                    </div>
                    <div id="list-jurnal" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>

                </main>
        </div>
    </div>

    <div id="modal-user" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/50">
        <div class="bg-white rounded-3xl w-full max-w-md p-6">
            <h3 class="font-bold text-xl mb-4">Form User</h3>
            <form id="form-user" class="space-y-4">
                <input type="text" id="u-nip" placeholder="NIP" class="w-full p-3 border rounded-xl" required>
                <input type="text" id="u-nama" placeholder="Nama Lengkap" class="w-full p-3 border rounded-xl" required>
                <select id="u-role" class="w-full p-3 border rounded-xl">
                    <option>Guru</option><option>Kepala Sekolah</option><option>Admin</option>
                </select>
                <input type="text" id="u-pass" placeholder="Password" class="w-full p-3 border rounded-xl" required>
                <button type="submit" class="w-full bg-brand-600 text-white py-3 rounded-xl font-bold">Simpan ke Cloud</button>
                <button type="button" onclick="closeModal('modal-user')" class="w-full text-slate-500 mt-2">Batal</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // DATA STATE (IN-MEMORY)
        // ==========================================
        let db = { users: [], siswa: [], jurnal: [], absensi: [], nilai: [] };
        let currentUser = null;

        // ==========================================
        // DUMMY DATA FOR PREVIEW
        // ==========================================
        const DUMMY_DATA = {
            users: [
                { nip: 'admin', nama: 'Administrator', role: 'Admin', password: 'admin', foto: '' },
                { nip: 'guru', nama: 'Budi Guru, S.Pd', role: 'Guru', password: 'guru', foto: '' }
            ],
            siswa: [
                { id: 1, nis: '1001', nama: 'Andi Pratama', kelas: '7A', tahun: '2025/2026', pass: '123' }
            ],
            jurnal: [], absensi: [], nilai: []
        };

        // ==========================================
        // CORE FUNCTIONS
        // ==========================================
        async function cloudCall(action, module, data = null) {
            if (IS_PREVIEW) return { status: 'success', data: DUMMY_DATA[module] || [] };
            
            showLoading(true);
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, module, data })
                });
                const res = await response.json();
                if (res.status === 'success') return res;
                throw new Error(res.message);
            } catch (e) {
                showToast(e.message, 'error');
                return null;
            } finally {
                showLoading(false);
            }
        }

        async function fetchAllData() {
            if (IS_PREVIEW) {
                db = JSON.parse(JSON.stringify(DUMMY_DATA));
                return;
            }
            showLoading(true);
            try {
                const res = await fetch(GAS_URL + "?action=load");
                db = await res.json();
            } catch (e) {
                showToast("Gagal memuat data dari Cloud", "error");
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            document.getElementById('loading-screen').style.display = show ? 'flex' : 'none';
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `p-4 rounded-xl text-white font-bold shadow-lg fade-in ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

        // ==========================================
        // LOGIN LOGIC
        // ==========================================
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            
            await fetchAllData();
            
            const found = db.users.find(x => x.nip === u && x.password === p);
            if (found) {
                currentUser = found;
                initApp();
                showToast(`Selamat datang, ${found.nama}`);
            } else {
                showToast("NIP atau Password salah", "error");
            }
        });

        function initApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('sidebar-name').innerText = currentUser.nama;
            document.getElementById('sidebar-role').innerText = currentUser.role;
            document.getElementById('sidebar-avatar').src = `https://ui-avatars.com/api/?name=${currentUser.nama}&background=random`;

            renderMenu();
            switchView(currentUser.role === 'Admin' ? 'view-user' : 'view-jurnal');
        }

        function renderMenu() {
            const menu = [
                { id: 'view-user', role: ['Admin'], text: 'User', icon: 'fa-users' },
                { id: 'view-siswa', role: ['Admin'], text: 'Siswa', icon: 'fa-user-graduate' },
                { id: 'view-jurnal', role: ['Admin', 'Guru', 'Kepala Sekolah'], text: 'Jurnal', icon: 'fa-book' }
            ];
            let html = '';
            menu.forEach(m => {
                if (m.role.includes(currentUser.role)) {
                    html += `<button onclick="switchView('${m.id}')" class="w-full flex items-center gap-3 px-4 py-3 font-bold text-slate-600 rounded-xl hover:bg-brand-50 hover:text-brand-600">
                        <i class="fas ${m.icon}"></i> ${m.text}
                    </button>`;
                }
            });
            document.getElementById('nav-menu').innerHTML = html;
        }

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'view-user') renderUser();
            if (id === 'view-siswa') renderSiswa();
        }

        // ==========================================
        // MODULE: USER
        // ==========================================
        function renderUser() {
            const tb = document.getElementById('tbody-user');
            tb.innerHTML = db.users.map(u => `
                <tr class="border-b">
                    <td class="px-6 py-3"><img src="https://ui-avatars.com/api/?name=${u.nama}" class="w-8 h-8 rounded-full"></td>
                    <td class="px-6 py-3">${u.nip}</td>
                    <td class="px-6 py-3 font-bold">${u.nama}</td>
                    <td class="px-6 py-3 text-sm">${u.role}</td>
                    <td class="px-6 py-3 text-center">
                        <button onclick="deleteUser('${u.nip}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function openModalUser() { openModal('modal-user'); document.getElementById('form-user').reset(); }

        document.getElementById('form-user').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newData = {
                nip: document.getElementById('u-nip').value,
                nama: document.getElementById('u-nama').value,
                role: document.getElementById('u-role').value,
                password: document.getElementById('u-pass').value,
                foto: ''
            };
            
            // Simpan ke State
            db.users.push(newData);
            // Simpan ke Cloud
            await cloudCall('update_module', 'users', db.users);
            
            closeModal('modal-user');
            renderUser();
            showToast("User berhasil disimpan ke Cloud");
        });

        async function deleteUser(nip) {
            if (!confirm("Hapus user ini?")) return;
            db.users = db.users.filter(x => x.nip !== nip);
            await cloudCall('update_module', 'users', db.users);
            renderUser();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
