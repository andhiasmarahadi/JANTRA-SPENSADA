<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANTRA - Jurnal Absensi Nilai Terintegrasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; user-select: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Modal Background Overlay */
        .modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="modalContainer"></div>

    <script>
        // KONFIGURASI APLIKASI
        const IS_PREVIEW = false; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzvvpVZgAGUu5Nef1teyJJ3wTPfhz7etbyslcpPgovg974p03NwRk8m2yMkWf6711wV/exec";

        // PROTEKSI ANTI HACKER
        document.addEventListener('contextmenu', event => { event.preventDefault(); Swal.fire({icon: 'warning', title: 'Akses Ditolak', text: 'Klik kanan dinonaktifkan demi keamanan.', timer: 1500, showConfirmButton: false}); });
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) { Swal.fire({icon: 'error', title: 'Aksi Ilegal', text: 'Inspect Element dinonaktifkan.', timer: 1500, showConfirmButton: false}); return false; } };

        let state = {
            currentUser: null, activeMenu: 'dashboard',
            users: [], siswa: [], jurnal: [], absensi: [], nilai: []
        };

        // Data Dummy
        const dummyUsers = [
            { id: 'U1', nip: 'admin', nama: 'Administrator', password: 'edudigital', role: 'Admin', mapel: '-', foto: '' },
            { id: 'U2', nip: 'kepsek', nama: 'Kepala Sekolah', password: 'edudigital', role: 'Kepala Sekolah', mapel: '-', foto: '' },
            { id: 'U3', nip: 'guru', nama: 'Guru Penggerak', password: 'edudigital', role: 'Guru', mapel: 'Matematika', foto: '' }
        ];
        const dummySiswa = [
            { id: 'S1', no: '1', nis: '1001', nisn: '00112233', nama: 'Budi Santoso', jk: 'L', password: 'pass', kelas: '7A', tahun: '2025/2026', foto: '' },
            { id: 'S2', no: '2', nis: '1002', nisn: '00112244', nama: 'Siti Aminah', jk: 'P', password: 'pass', kelas: '7A', tahun: '2025/2026', foto: '' }
        ];
        const dummyJurnal = [
            { id: 'J1', tgl: new Date().toISOString().split('T')[0], nip: 'guru', nama: 'Guru Penggerak', kelas: '7A', jamMulai: '1', jamSelesai: '2', uraian: 'Mengajar Aljabar Dasar', foto: '' }
        ];

        const kelasList = ['Kegiatan Umum', 'Istirahat', '7A','7B','7C','7D','7E','7F','7G', '8A','8B','8C','8D','8E','8F','8G', '9A','9B','9C','9D','9E','9F','9G'];
        const tahunList = ['2025/2026', '2026/2027', '2027/2028', '2028/2029', '2029/2030', '2030/2031'];

        const showLoading = () => Swal.fire({ title: 'Memproses Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const closeLoading = () => Swal.close();
        const showToast = (icon, title) => Swal.fire({ icon, title, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });

        async function apiCall(action, payload = {}) {
            if (IS_PREVIEW) return handlePreviewLogic(action, payload);
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action, payload }) });
                const res = await response.json();
                if(!res.success) throw new Error(res.message);
                
                // NORMALIZE ID: Memastikan id dari backend terekam ke variabel 'id' agar fungsi Edit/Hapus bekerja
                if(res.data && Array.isArray(res.data)) {
                    res.data = res.data.map(item => {
                        if(!item.id) item.id = item.id_user || item.id_siswa || item.id_jurnal || item.id_absen || item.id_nilai;
                        return item;
                    });
                } else if (res.data && typeof res.data === 'object' && !res.data.id) {
                    res.data.id = res.data.id_user || res.data.id_siswa || res.data.id_jurnal || res.data.id_absen || res.data.id_nilai;
                }
                
                return res;
            } catch (error) {
                Swal.fire('Error', error.message || 'Koneksi ke Server Gagal!', 'error');
                throw error;
            }
        }

        async function handlePreviewLogic(action, p) {
            return new Promise(resolve => setTimeout(() => {
                let res = { success: true, data: [] };
                if (action === 'login') {
                    const u = dummyUsers.find(x => String(x.nip) === String(p.username) && String(x.password) === String(p.password));
                    if (u) res.data = u; else { res.success = false; res.message = 'Username/Password Salah'; }
                } 
                else if (action === 'getUsers') res.data = dummyUsers;
                else if (action === 'saveUser') {
                    if(p.id) { let idx = dummyUsers.findIndex(x=>x.id===p.id); if(idx>-1) dummyUsers[idx] = p; }
                    else { p.id = 'U'+Date.now(); dummyUsers.push(p); }
                }
                else if (action === 'deleteUser') { const idx = dummyUsers.findIndex(x=>x.id===p.id); if(idx>-1) dummyUsers.splice(idx,1); }
                else if (action === 'deleteAllUsers') { dummyUsers.length = 1; /* Keep Admin */ }
                else if (action === 'uploadBatchUser') { p.forEach(x => dummyUsers.push({id:'U'+Math.random(), ...x})); }

                else if (action === 'getSiswa') res.data = dummySiswa;
                else if (action === 'saveSiswa') {
                    if(p.id) { let idx = dummySiswa.findIndex(x=>x.id===p.id); if(idx>-1) dummySiswa[idx] = p; }
                    else { p.id = 'S'+Date.now(); dummySiswa.push(p); }
                }
                else if (action === 'deleteSiswa') { const idx = dummySiswa.findIndex(x=>x.id===p.id); if(idx>-1) dummySiswa.splice(idx,1); }
                else if (action === 'deleteAllSiswa') { dummySiswa.length = 0; }
                else if (action === 'uploadBatchSiswa') { p.forEach(x => dummySiswa.push({id:'S'+Math.random(), ...x})); }

                else if (action === 'getJurnal') res.data = dummyJurnal;
                else if (action === 'saveJurnal') { 
                    if(p.id) { 
                        let idx = dummyJurnal.findIndex(x=>x.id===p.id); 
                        if(idx>-1) dummyJurnal[idx] = Object.assign(dummyJurnal[idx], p); 
                    } else { 
                        dummyJurnal.unshift({id: 'J'+Date.now(), ...p}); 
                    }
                }
                else if (action === 'deleteJurnalItem') {
                    let idx = dummyJurnal.findIndex(x=>x.id===p.id);
                    if(idx>-1) dummyJurnal.splice(idx,1);
                }
                else if (action === 'deleteJurnalAdmin') {
                    if(p.type==='all') dummyJurnal.length = 0;
                    if(p.type==='date') { for(let i=dummyJurnal.length-1; i>=0; i--) if(dummyJurnal[i].tgl===p.tgl) dummyJurnal.splice(i,1); }
                    if(p.type==='guru') { for(let i=dummyJurnal.length-1; i>=0; i--) if(dummyJurnal[i].nama.toLowerCase().includes(p.guru.toLowerCase())) dummyJurnal.splice(i,1); }
                }
                
                else if (action === 'getAbsensi') res.data = state.absensi;
                else if (action === 'saveBatchAbsen') p.forEach(x => state.absensi.push({id: 'A'+Math.random(), tanggal: x.tgl, ...x}));
                
                else if (action === 'getNilai') res.data = state.nilai;
                else if (action === 'saveBatchNilai') p.forEach(x => state.nilai.push({id: 'N'+Math.random(), tanggal: x.tgl, ...x}));
                
                else if (action === 'updateProfil') {
                    let idx = dummyUsers.findIndex(x=>x.id===state.currentUser.id);
                    if(idx>-1) { 
                        dummyUsers[idx].nama = p.nama; 
                        dummyUsers[idx].password = p.password; 
                        if(p.foto !== undefined) dummyUsers[idx].foto = p.foto;
                        state.currentUser.nama = p.nama; 
                        if(p.foto !== undefined) state.currentUser.foto = p.foto;
                    }
                }

                resolve(res);
            }, 500));
        }

        async function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        let canvas = document.createElement('canvas'); let ctx = canvas.getContext('2d');
                        let maxW = 600, maxH = 600; let width = img.width, height = img.height;
                        if (width > height && width > maxW) { height *= maxW / width; width = maxW; }
                        else if (height > maxH) { width *= maxH / height; height = maxH; }
                        canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.9; let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        const compress = () => {
                            let sizeKB = Math.round((dataUrl.length * 3 / 4) / 1024);
                            if (sizeKB > 25 && quality > 0.1) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); compress(); }
                            else resolve(dataUrl);
                        }; compress();
                    };
                };
            });
        }

        function render() {
            const app = document.getElementById('app');
            if (!state.currentUser) app.innerHTML = renderLogin();
            else app.innerHTML = renderDashboard();
        }

        function navigate(menu) {
            state.activeMenu = menu;
            render();
            if(menu === 'user') loadData('getUsers', 'users');
            if(menu === 'siswa') loadData('getSiswa', 'siswa');
            if(menu === 'jurnal' || menu === 'inputJurnal') { 
                showLoading();
                Promise.all([
                    apiCall('getJurnal').then(res => state.jurnal = res.data || []),
                    apiCall('getAbsensi').then(res => state.absensi = res.data || [])
                ]).then(() => {
                    closeLoading();
                    render();
                }).catch(err => {
                    closeLoading();
                    Swal.fire('Error', 'Gagal memuat data', 'error');
                });
            }
            if(menu === 'absensi' || menu === 'inputAbsensi') { loadData('getAbsensi', 'absensi'); loadData('getSiswa', 'siswa'); }
            if(menu === 'nilai' || menu === 'inputNilai') { loadData('getNilai', 'nilai'); loadData('getSiswa', 'siswa'); }
        }

        async function loadData(action, stateKey) {
            showLoading();
            try { const res = await apiCall(action); state[stateKey] = res.data || []; render(); } 
            finally { closeLoading(); }
        }

        function doLogout() {
            Swal.fire({ title: 'Logout?', text: 'Anda akan keluar dari aplikasi', icon: 'question', showCancelButton: true, confirmButtonText: 'Ya, Logout' })
            .then((result) => { if (result.isConfirmed) { state.currentUser = null; showToast('success', 'Berhasil Logout'); render(); } });
        }

        // ================= UI COMPONENTS =================
        function renderLogin() {
            return `
            <div class="flex flex-col md:flex-row h-screen w-full bg-white fade-in">
                <div class="w-full md:w-1/2 bg-white border-r border-gray-100 flex flex-col items-center justify-center p-10 relative">
                    <img src="https://i.imghippo.com/files/SQxV3752W.png" alt="Logo" class="max-w-full h-auto drop-shadow-xl hover:scale-105 transition-transform duration-500 mb-8">
                    <div class="absolute bottom-8 text-center w-full"><p class="text-gray-400 font-medium text-sm tracking-wide">Aplikasi ini dibuat Andhi Asmara Hadi</p></div>
                </div>
                <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-white">
                    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-50">
                        <div class="text-center mb-8"><h2 class="text-3xl font-bold text-gray-800 mb-2">Selamat Datang</h2><p class="text-gray-500">Silakan login untuk mengakses sistem</p></div>
                        <form onsubmit="handleLogin(event)" class="space-y-6">
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Username / NIP</label><div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fas fa-user text-gray-400"></i></div><input type="text" id="loginUsername" required class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan Username"></div></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><div class="relative"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fas fa-lock text-gray-400"></i></div><input type="password" id="loginPassword" required class="pl-10 w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan Password"></div></div>
                            ${IS_PREVIEW ? `<div class="bg-yellow-50 text-yellow-800 p-3 rounded-lg text-sm border border-yellow-200"><b>Mode Preview Aktif.</b><br>Admin: admin / edudigital</div>` : ''}
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 shadow-lg">LOGIN</button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        async function handleLogin(e) {
            e.preventDefault(); const u = document.getElementById('loginUsername').value; const p = document.getElementById('loginPassword').value;
            showLoading(); try { const res = await apiCall('login', { username: u, password: p }); closeLoading(); if(res.success) { state.currentUser = res.data; state.activeMenu = 'jurnal'; showToast('success', `Selamat Datang, ${state.currentUser.nama}`); render(); } else { Swal.fire('Gagal Login', res.message || 'Username / Password salah', 'error'); } } catch(err) { closeLoading(); Swal.fire('Gagal Login', err.message || 'Terjadi kesalahan sistem/koneksi', 'error'); }
        }

        function renderDashboard() {
            const role = state.currentUser.role; let menus = '';
            if(role === 'Admin') {
                menus += `<div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 px-4">Database Admin</div>`;
                menus += createMenuItem('user', 'Kelola Data User', 'fa-users-cog');
                menus += createMenuItem('siswa', 'Kelola Data Siswa', 'fa-user-graduate');
            }
            menus += `<div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 px-4">Akademik</div>`;
            menus += createMenuItem('jurnal', 'Jurnal Guru', 'fa-book');
            menus += createMenuItem('absensi', 'Absensi Siswa', 'fa-calendar-check');
            menus += createMenuItem('nilai', 'Daftar Nilai Siswa', 'fa-star');
            menus += `<div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 px-4">Pengaturan</div>`;
            menus += createMenuItem('profil', 'Ubah Profil', 'fa-user-edit');
            
            return `
            <div class="flex h-screen overflow-hidden bg-gray-50 fade-in w-full">
                <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex absolute md:relative z-20 h-full transition-transform transform md:translate-x-0 -translate-x-full">
                    <div class="flex flex-col items-center py-8 border-b border-gray-100 relative">
                        <button onclick="toggleSidebar()" class="absolute top-4 right-4 md:hidden text-gray-500 hover:text-gray-800"><i class="fas fa-times text-xl"></i></button>
                        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-2xl font-bold mb-3 shadow-inner overflow-hidden">
                            ${state.currentUser.foto ? `<img src="${state.currentUser.foto}" class="w-full h-full object-cover">` : state.currentUser.nama.charAt(0)}
                        </div>
                        <h3 class="font-bold text-gray-800 text-center px-4">${state.currentUser.nama}</h3>
                        <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-semibold mt-1">${role}</span>
                    </div>
                    <nav class="flex-1 overflow-y-auto p-2 space-y-1 hide-scroll">${menus}</nav>
                    <div class="p-4 border-t border-gray-200"><button onclick="doLogout()" class="w-full flex items-center px-4 py-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-xl font-medium"><i class="fas fa-sign-out-alt mr-3"></i> Logout</button></div>
                </aside>
                <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-10 hidden md:hidden" onclick="toggleSidebar()"></div>
                <main class="flex-1 flex flex-col h-screen w-full overflow-hidden relative">
                    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-8 z-0">
                        <button onclick="toggleSidebar()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"><i class="fas fa-bars"></i></button>
                        <h2 class="text-lg font-semibold text-gray-800 hidden sm:block">${state.activeMenu.toUpperCase().replace('INPUT', 'INPUT ')}</h2>
                        <div class="text-sm font-medium text-gray-500"><i class="far fa-calendar-alt mr-2"></i>${new Date().toLocaleDateString('id-ID', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}</div>
                    </header>
                    <div class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 lg:p-8">${renderActiveMenu()}</div>
                </main>
            </div>`;
        }
        function toggleSidebar() { 
            const sb = document.getElementById('sidebar'); 
            const ov = document.getElementById('sidebarOverlay'); 
            if(window.innerWidth >= 768) {
                if(sb.classList.contains('md:flex')) { sb.classList.remove('md:flex'); sb.classList.add('hidden'); }
                else { sb.classList.add('md:flex'); sb.classList.remove('hidden'); }
            } else {
                if(sb.classList.contains('-translate-x-full')) { sb.classList.remove('hidden', '-translate-x-full'); ov.classList.remove('hidden'); } 
                else { sb.classList.add('-translate-x-full'); setTimeout(() => sb.classList.add('hidden'), 300); ov.classList.add('hidden'); } 
            }
        }
        function createMenuItem(id, label, icon) { const active = state.activeMenu.includes(id) ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-blue-50'; return `<button onclick="navigate('${id}')" class="w-full flex items-center px-4 py-2.5 rounded-xl transition-all font-medium ${active}"><i class="fas ${icon} w-5 mr-3 text-center"></i> ${label}</button>`; }
        function renderActiveMenu() {
            const m = state.activeMenu;
            if(m === 'user') return renderKelolaUser(); if(m === 'siswa') return renderKelolaSiswa();
            if(m === 'jurnal') return renderJurnal(); if(m === 'inputJurnal') return renderInputJurnal();
            if(m === 'absensi') return renderAbsensi(); if(m === 'inputAbsensi') return renderInputAbsensi();
            if(m === 'nilai') return renderNilai(); if(m === 'inputNilai') return renderInputNilai();
            if(m === 'profil') return renderProfil(); return '';
        }

        // ================= MODAL HANDLER =================
        function openModal(htmlContent) {
            document.getElementById('modalContainer').innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg fade-in"><div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]"><div class="overflow-y-auto p-6">${htmlContent}</div></div></div>`;
        }
        function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

        // ================= KELOLA USER (ADMIN) =================
        function renderKelolaUser() {
            if(state.currentUser.role !== 'Admin') return `<p class="text-red-500">Akses Ditolak.</p>`;
            
            let tbody = state.users.map((u, i) => `
                <tr class="border-b hover:bg-gray-50 user-row">
                    <td class="p-3 text-sm text-center">${i+1}</td>
                    <td class="p-3 text-sm font-medium">${u.nip}</td>
                    <td class="p-3 text-sm">${u.nama} <br><span class="text-xs bg-gray-200 px-2 py-0.5 rounded">${u.role}</span></td>
                    <td class="p-3 text-sm text-gray-400">********</td>
                    <td class="p-3 text-sm">${u.mapel || '-'}</td>
                    <td class="p-3 text-center">${u.foto ? `<img src="${u.foto}" class="w-10 h-10 rounded-full mx-auto object-cover">` : '-'}</td>
                    <td class="p-3 text-center">
                        <button onclick='formUser(${JSON.stringify(u)})' class="text-blue-500 hover:text-blue-700 mx-1"><i class="fas fa-edit"></i></button>
                        <button onclick="hapusUser('${u.id}')" class="text-red-500 hover:text-red-700 mx-1"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');

            return `
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Kelola Data User</h1>
                <button onclick="formUser()" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-700"><i class="fas fa-plus mr-2"></i>Tambah User</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4 items-center border border-gray-100">
                <div class="flex-1">
                    <label class="text-xs text-gray-500">Cari Nama User (Real-time)</label>
                    <input type="text" id="fuNama" oninput="filterUserRealtime()" class="w-full border rounded-lg p-2 text-sm focus:ring-blue-500" placeholder="Ketik nama...">
                </div>
                <button onclick="document.getElementById('fuNama').value=''; filterUserRealtime();" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg shadow hover:bg-gray-300 mt-5">Reset</button>
            </div>
            <div class="flex flex-wrap gap-2 mb-4">
                <button onclick="downloadTemplateUser()" class="bg-green-600 text-white px-3 py-2 rounded-lg text-sm shadow hover:bg-green-700"><i class="fas fa-file-excel mr-1"></i> Download Template</button>
                <label class="bg-yellow-500 text-white px-3 py-2 rounded-lg text-sm shadow hover:bg-yellow-600 cursor-pointer"><i class="fas fa-upload mr-1"></i> Upload Excel<input type="file" class="hidden" accept=".xlsx, .xls" onchange="uploadExcelUser(event)"></label>
                <button onclick="hapusSemuaUser()" class="bg-red-600 text-white px-3 py-2 rounded-lg text-sm shadow hover:bg-red-700 ml-auto"><i class="fas fa-trash-alt mr-1"></i> Hapus Semua Data</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                <div class="overflow-x-auto overflow-y-auto max-h-[60vh] pb-4">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead class="bg-gray-50 text-gray-700 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="p-3 border-b text-center w-10 whitespace-nowrap">No</th>

            const rows = document.querySelectorAll('.user-row');
            let hasVisible = false;
            rows.forEach(row => {
                const text = row.cells[2].textContent.toLowerCase();
                if(text.includes(query)) {
                    row.style.display = '';
                    hasVisible = true;
                } else {
                    row.style.display = 'none';
                }
            });
            let emptyMsg = document.getElementById('userEmptyRow');
            if(emptyMsg) {
                emptyMsg.style.display = hasVisible ? 'none' : '';
            } else if(!hasVisible && rows.length > 0) {
                document.getElementById('userTableBody').insertAdjacentHTML('beforeend', `<tr id="userEmptyRow"><td colspan="7" class="p-8 text-center text-gray-500">Data tidak ditemukan</td></tr>`);

        function renderJurnal() {
            const r = state.currentUser.role;
            let btnInput = (r !== 'Admin') ? `<button onclick="navigate('inputJurnal')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow"><i class="fas fa-plus mr-2"></i>Input Jurnal</button>` : '';
            let btnAksi = (r === 'Admin') ? `<button onclick="modalHapusJurnal()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-lg text-sm ml-2 shadow"><i class="fas fa-trash-alt"></i> Hapus Lanjutan</button>` : '';

            // Filter UI
            const fdMulai = document.getElementById('fTglMulai')?.value || ''; const fdAkhir = document.getElementById('fTglAkhir')?.value || ''; const fguru = (document.getElementById('fGuru')?.value || '').toLowerCase();
            let filtered = state.jurnal.filter(j => {
                if(r === 'Guru' && j.nip !== state.currentUser.nip) return false;
                let passTgl = true; if(fdMulai && j.tgl < fdMulai) passTgl = false; if(fdAkhir && j.tgl > fdAkhir) passTgl = false;
                let passGuru = j.nama.toLowerCase().includes(fguru);
                return passTgl && passGuru;
            });

            let tbody = filtered.map((j, i) => {
                let h='-', s='-', ij='-', a='-';
                let parsedUraian = j.uraian || '';
                // Ekstraksi data H/S/I/A dari string uraian menggunakan regex
                let match = parsedUraian.match(/^\[H:(\d+)\|S:(\d+)\|I:(\d+)\|A:(\d+)\]\s*(.*)$/is);
                if(match) {
                    h=match[1]; s=match[2]; ij=match[3]; a=match[4];
                    parsedUraian = match[5];
                }
                let absCell = (j.kelas === 'Kegiatan Umum' || j.kelas === 'Istirahat') ? '-' : `<div class="flex justify-center gap-2"><span class="text-green-600 font-bold" title="Hadir">H:${h}</span> <span class="text-yellow-600 font-bold" title="Sakit">S:${s}</span> <span class="text-blue-600 font-bold" title="Ijin">I:${ij}</span> <span class="text-red-600 font-bold" title="Alpha">A:${a}</span></div>`;

                let aksiCell = `<button onclick="editJurnalItem('${j.id}')" class="text-blue-500 hover:text-blue-700 mx-1" title="Edit"><i class="fas fa-edit"></i></button>
                                <button onclick="hapusJurnalItem('${j.id}')" class="text-red-500 hover:text-red-700 mx-1" title="Hapus"><i class="fas fa-trash"></i></button>`;

                let jamTampil = (j.jamMulai === j.jamSelesai) ? j.jamMulai : `${j.jamMulai}-${j.jamSelesai}`;

                return `<tr class="border-b hover:bg-gray-50"><td class="p-3 text-sm text-center">${i+1}</td><td class="p-3 text-sm whitespace-nowrap">${j.tgl}</td><td class="p-3 text-sm font-medium whitespace-nowrap">${j.nama}</td><td class="p-3 text-sm text-center whitespace-nowrap"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-bold">${j.kelas}</span></td><td class="p-3 text-sm text-center whitespace-nowrap">${jamTampil}</td><td class="p-3 text-sm">${parsedUraian}</td><td class="p-3 text-sm text-center whitespace-nowrap text-xs">${absCell}</td><td class="p-3 text-center action-col whitespace-nowrap">${j.foto ? `<button onclick="viewImage('${j.foto}')" class="text-blue-500 text-xl"><i class="fas fa-image"></i></button>` : '-'}</td><td class="p-3 text-center whitespace-nowrap">${aksiCell}</td></tr>`;
            }).join('');

            return `

            </div>

        function cetakJurnal() {
            const fdMulai = document.getElementById('fTglMulai')?.value || '';
            const fdAkhir = document.getElementById('fTglAkhir')?.value || '';
            const fguru = (document.getElementById('fGuru')?.value || '').toLowerCase();
            const r = state.currentUser.role;

            let filtered = state.jurnal.filter(j => {
                if(r === 'Guru' && j.nip !== state.currentUser.nip) return false;
                let passTgl = true; if(fdMulai && j.tgl < fdMulai) passTgl = false; if(fdAkhir && j.tgl > fdAkhir) passTgl = false;
                let passGuru = j.nama.toLowerCase().includes(fguru);
                return passTgl && passGuru;
            });

            if(filtered.length === 0) return Swal.fire('Kosong', 'Tidak ada data jurnal pada rentang/filter ini.', 'warning');

            // Urutkan berdasarkan tanggal (ascending) lalu berdasarkan jam (ascending)
            filtered.sort((a,b) => {
                let dateCmp = a.tgl.localeCompare(b.tgl);
                if (dateCmp !== 0) return dateCmp;
                return parseInt(a.jamMulai) - parseInt(b.jamMulai);
            });

            const formatDateStr = (dateStr) => {
                const d = new Date(dateStr);
                const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
                const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
                return `${days[d.getDay()]},<br>${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            };

            let trs = '';
            let no = 1;
            
            // Mengelompokkan data berdasarkan Tanggal & NIP untuk membuat Rowspan (seperti di gambar)
            let grouped = {};
            filtered.forEach(j => {
                let k = j.tgl + '_' + j.nip;
                if(!grouped[k]) grouped[k] = [];
                grouped[k].push(j);
            });

            for(let key in grouped) {
                let items = grouped[key];
                let first = items[0];
                let rowspan = items.length;
                let dateFormatted = formatDateStr(first.tgl);

                items.forEach((j, idx) => {
                    let h='-', s='-', ij='-', a='-';
                    let parsedUraian = j.uraian || '';
                    let match = parsedUraian.match(/^\[H:(\d+)\|S:(\d+)\|I:(\d+)\|A:(\d+)\]\s*(.*)$/is);
                    if(match) {
                        h=match[1]; s=match[2]; ij=match[3]; a=match[4];
                        parsedUraian = match[5];
                    }

                    trs += `<tr>`;
                    if(idx === 0) {
                        trs += `<td rowspan="${rowspan}" style="text-align:center; vertical-align:middle;">${no++}</td>`;
                        trs += `<td rowspan="${rowspan}" style="text-align:center; vertical-align:middle;">${dateFormatted}</td>`;
                    }
                    
                    let jamTampil = (j.jamMulai === j.jamSelesai) ? j.jamMulai : `${j.jamMulai}-${j.jamSelesai}`;
                    
                    if (j.kelas === 'Istirahat') {
                        // Merge dari Jam Ke sampai Foto (Total 8 Kolom di sebelah kanan tanggal)
                        trs += `<td colspan="8" class="bg-blue-light" style="text-align:center; font-weight:bold; padding:8px;">Istirahat</td>`;
                    } else if (j.kelas === 'Kegiatan Umum') {
                        // Merge dari Kelas sampai Alpha (Total 6 Kolom)
                        trs += `<td style="text-align:center;">${jamTampil}</td>`;
                        trs += `<td colspan="6" style="text-align:left; padding-left:5px;">${parsedUraian}</td>`;
                        trs += `<td style="text-align:center; padding:2px; vertical-align:middle;">${j.foto ? `<img src="${j.foto}" style="max-height:60px; max-width:80px; object-fit:contain; border-radius:4px;">` : ''}</td>`;
                    } else {
                        // Tampilan Normal
                        trs += `<td style="text-align:center;">${jamTampil}</td>`;
                        trs += `<td style="text-align:center;">${j.kelas}</td>`;
                        trs += `<td style="text-align:left; padding-left:5px;">${parsedUraian}</td>`;
                        trs += `<td style="text-align:center;">${h}</td><td style="text-align:center;">${s}</td><td style="text-align:center;">${ij}</td><td style="text-align:center;">${a}</td>`;
                        trs += `<td style="text-align:center; padding:2px; vertical-align:middle;">${j.foto ? `<img src="${j.foto}" style="max-height:60px; max-width:80px; object-fit:contain; border-radius:4px;">` : ''}</td>`;
                    }
                    trs += `</tr>`;
                });
            }

            let isSingleTeacher = filtered.length > 0 && filtered.every(j => j.nip === filtered[0].nip);
            let teacherName = isSingleTeacher ? filtered[0].nama : (r === 'Guru' ? state.currentUser.nama : '.......................................');
            let teacherNip = isSingleTeacher ? filtered[0].nip : (r === 'Guru' ? state.currentUser.nip : '.......................................');
            
            let headerHTML = `
                <div class="header-area">
                    <div style="text-align:center; margin-bottom:15px; border-bottom:2px solid black; padding-bottom:5px;">
                        <img src="https://i.imghippo.com/files/UL4915SP.png" style="width:100%; max-height:80px; object-fit:contain;">
                    </div>
                </div>
            `;

            const printWindow = window.open('', '', 'height=800,width=1000');
            printWindow.document.write(`<html><head><title>Cetak Jurnal</title>
            <style>
                @page { size: A4 portrait; margin: 1.5cm; }
                @media print { body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } }
                body { font-family: Arial, sans-serif; font-size: 8pt; color: #000; margin: 0; padding: 0; }
                .container { display: flex; flex-direction: column; width: 100%; }
                table.main-table { border-collapse: collapse; width: 100%; font-size: 8pt; margin-bottom: 20px; }
                table.main-table th, table.main-table td { border: 1px solid black; padding: 4px; }
                table.main-table th { background-color: #d9e1f2; text-align: center; font-weight: bold; }
                .bg-blue-light { background-color: #d9e1f2 !important; }
                .signature-area { display:flex; justify-content:space-between; font-size:9pt; margin-top: 20px; page-break-inside: avoid; }
            </style></head><body>
            <div class="container">
                ${headerHTML}
                <table class="main-table">
                    <thead>
                        <tr>
                            <th rowspan="2" style="width:25px;">No</th>
                            <th rowspan="2" style="width:70px;">Hari/Tanggal</th>
                            <th rowspan="2" style="width:30px;">Jam Ke</th>
                            <th rowspan="2" style="width:50px;">Kelas</th>
                            <th rowspan="2">Uraian Kegiatan</th>
                            <th rowspan="2" style="width:60px;">Banyak Siswa yang Ikut PBM</th>
                            <th colspan="3">Banyak Siswa yang Tidak Ikut PBM</th>
                            <th rowspan="2" style="width:85px;">Foto Kegiatan</th>
                        </tr>
                        <tr>
                            <th style="width:35px;">Sakit</th>

                        </tr>
                    </thead>
                    <tbody>${trs}</tbody>
                </table>
                <div class="signature-area">
                    <div style="text-align:left;"><div>Mengetahui</div><div>Kepala SMPN 1 Dawan</div><div style="margin-top:60px; font-weight:bold; text-decoration:underline;">Ni Kadek Yadnyani, S.Pd</div><div>NIP. 19791016 200604 2 006</div></div>
                    <div style="text-align:left;"><div>Dawan, ${new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</div><div>Guru Mata Pelajaran</div><div style="margin-top:60px; font-weight:bold; text-decoration:underline;">${teacherName}</div><div>NIP. ${teacherNip}</div></div>
                </div>
            </div>
            <script>
                Promise.all(Array.from(document.images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                })).then(() => { setTimeout(() => window.print(), 300); });
            <\/script>
            </body></html>`);
            printWindow.document.close();
        }

        window.handleKelasJurnalChange = function(val) {
            const uraian = document.getElementById('jUraian');
            const foto = document.getElementById('jFoto');
            if(!uraian || !foto) return;
            if(val === 'Istirahat') {
                uraian.disabled = true; uraian.required = false; uraian.value = 'Istirahat'; uraian.classList.add('bg-gray-100', 'cursor-not-allowed');
                foto.disabled = true; foto.value = ''; document.getElementById('jPreview').classList.add('hidden'); document.getElementById('jBase64').value = ''; foto.classList.add('bg-gray-100', 'cursor-not-allowed');
            } else {
                uraian.disabled = false; uraian.required = true; if(uraian.value === 'Istirahat') uraian.value = ''; uraian.classList.remove('bg-gray-100', 'cursor-not-allowed');
                foto.disabled = false; foto.classList.remove('bg-gray-100', 'cursor-not-allowed');
            }
            updateRekapJurnal();
        };

        window.updateRekapJurnal = function() {
            const kls = document.getElementById('jKelas')?.value;
            const tgl = document.getElementById('jTgl')?.value;
            const rekapContainer = document.getElementById('jRekapAbsensi');
            if(!rekapContainer) return;
            
            if(kls && kls !== 'Kegiatan Umum' && kls !== 'Istirahat') {
                rekapContainer.classList.remove('hidden');
                rekapContainer.classList.add('grid');
                let h=0, s=0, i=0, a=0;
                
                // Cari data absensi sesuai tanggal dan kelas terpilih
                if (state.absensi && state.absensi.length > 0) {
                    let abs = state.absensi.filter(x => x.kelas === kls && (x.tanggal === tgl || x.tgl === tgl));
                    abs.forEach(x => {
                        if(x.status_kehadiran === 'Hadir') h++;
                        else if(x.status_kehadiran === 'Sakit') s++;
                        else if(x.status_kehadiran === 'Ijin') i++;
                        else if(x.status_kehadiran === 'Alpha') a++;
                    });
                }
                
                document.getElementById('jHadir').value = h;
                document.getElementById('jSakit').value = s;
                document.getElementById('jIjin').value = i;
                document.getElementById('jAlpha').value = a;
            } else {
                rekapContainer.classList.add('hidden');
                rekapContainer.classList.remove('grid');
            }
        };

            <div class="bg-white p-4 rounded-xl shadow-sm mb-4 grid grid-cols-2 md:grid-cols-5 gap-4 items-end border border-gray-100">

                <div><label class="text-xs text-gray-500">Semester</label><select id="faSem" class="w-full border rounded p-2 text-sm"><option value="">Semua</option><option value="Ganjil" ${fSem==='Ganjil'?'selected':''}>Ganjil</option><option value="Genap" ${fSem==='Genap'?'selected':''}>Genap</option></select></div>
                <div><label class="text-xs text-gray-500">Nama Siswa</label><input type="text" id="faNama" value="${fNama}" class="w-full border rounded p-2 text-sm" placeholder="Ketik..."></div>
                <div class="flex gap-2">
                    <button onclick="render()" class="bg-gray-800 text-white w-10 h-10 rounded-lg shadow hover:bg-gray-900 flex items-center justify-center transition-colors" title="Filter Data"><i class="fas fa-search"></i></button>
                    <button onclick="document.getElementById('faKls').value=''; document.getElementById('faThn').value=''; document.getElementById('faSem').value=''; document.getElementById('faNama').value=''; render();" class="bg-gray-200 text-gray-700 w-10 h-10 rounded-lg shadow hover:bg-gray-300 flex items-center justify-center transition-colors" title="Reset Filter"><i class="fas fa-undo"></i></button>

        function cetakAbsensi() {
            const fKelas = document.getElementById('faKls')?.value || '';
            const fTahun = document.getElementById('faThn')?.value || '';
            const fSem = document.getElementById('faSem')?.value || '';

            if(!fKelas || !fTahun || !fSem) {
                return Swal.fire('Informasi', 'Mohon pilih Filter "Tahun Pelajaran", "Kelas", dan "Semester" terlebih dahulu agar cetakan rapi!', 'info');
            }

            let students = state.siswa.filter(s => s.kelas === fKelas && s.tahun === fTahun);
            students.sort((a,b) => a.nama.localeCompare(b.nama));
            
            if(students.length === 0) return Swal.fire('Kosong', 'Tidak ada siswa di kelas tersebut', 'warning');

            let filteredAbs = state.absensi.filter(a => a.kelas === fKelas && a.tahun === fTahun && a.semester === fSem);
            let uniqueDates = [...new Set(filteredAbs.map(a => a.tanggal || a.tgl))].sort();

            let headerHTML = `
                <div class="header-area">
                    <div style="text-align:center; margin-bottom:15px; border-bottom:2px solid black; padding-bottom:5px;">
                        <img id="kopImg" src="https://i.imghippo.com/files/UL4915SP.png" style="width:100%; max-height:80px; object-fit:contain;">
                    </div>
                    <h3 style="text-align:center; margin:0; font-size:11pt;">DAFTAR HADIR ${state.currentUser.mapel.toUpperCase()}</h3>
                    <h3 style="text-align:center; margin:0; margin-bottom:15px; font-size:11pt;">TAHUN PELAJARAN ${fTahun}</h3>
                    <table class="info-table" style="width:100%; border:none; margin-bottom:5px; font-size:10pt; font-weight:bold;">
                        <tr>
                            <td style="width:33%; border:none; text-align:left; padding:0;">Kelas : ${fKelas}</td>
                            <td style="width:33%; border:none; text-align:center; padding:0;">Mapel : ${state.currentUser.mapel}</td>
                            <td style="width:33%; border:none; text-align:right; padding:0;">Semester : ${fSem}</td>
                        </tr>
                    </table>
                </div>
            `;

            let dateHeaders = uniqueDates.length > 0 ? uniqueDates.map(d => {
                let p = d.split('-'); return p.length===3 ? `${p[2]}/${p[1]}` : d;
            }).join('</th><th class="bg-blue">') : '-';

            let trs = students.map((s, idx) => {
                let S=0, I=0, A=0;
                let dCells = uniqueDates.map(d => {
                    let rec = filteredAbs.find(x => x.nisn === s.nisn && (x.tanggal === d || x.tgl === d));
                    if(!rec) return `<td></td>`;
                    if(rec.status_kehadiran === 'Hadir') return `<td>V</td>`;
                    if(rec.status_kehadiran === 'Sakit') { S++; return `<td class="bg-green">S</td>`; }
                    if(rec.status_kehadiran === 'Ijin') { I++; return `<td class="bg-yellow">I</td>`; }
                    if(rec.status_kehadiran === 'Alpha') { A++; return `<td class="bg-red">A</td>`; }
                    return `<td></td>`;
                }).join('');
                if(uniqueDates.length===0) dCells = `<td></td>`;
                return `<tr>
                    <td>${idx+1}</td>
                    <td style="text-align:left; padding-left:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;">${s.nama}</td>
                    <td>${s.jk || '-'}</td>
                    ${dCells}
                    <td class="bg-green font-bold">${S}</td>
                    <td class="bg-yellow font-bold">${I}</td>
                    <td class="bg-red font-bold">${A}</td>
                </tr>`;
            }).join('');

            let tCells = uniqueDates.map(d => `<td style="font-weight:bold;">${filteredAbs.filter(x => (x.tanggal===d||x.tgl===d) && x.status_kehadiran==='Hadir').length}</td>`).join('');
            if(uniqueDates.length===0) tCells = `<td>0</td>`;

            let totalHTML = `<tr>
                <td colspan="3" style="text-align:right; padding-right:8px; font-weight:bold;">Total Kehadiran</td>
                ${tCells}
                <td style="font-weight:bold;">${students.reduce((sum, s) => sum + filteredAbs.filter(x => x.nisn === s.nisn && x.status_kehadiran === 'Sakit').length, 0)}</td>
                <td style="font-weight:bold;">${students.reduce((sum, s) => sum + filteredAbs.filter(x => x.nisn === s.nisn && x.status_kehadiran === 'Ijin').length, 0)}</td>
                <td style="font-weight:bold;">${students.reduce((sum, s) => sum + filteredAbs.filter(x => x.nisn === s.nisn && x.status_kehadiran === 'Alpha').length, 0)}</td>
            </tr>`;

            const printWindow = window.open('', '', 'height=800,width=1000');
            printWindow.document.write(`<html><head><title>Cetak Absensi - ${fKelas}</title>
            <style>
                @page { size: A4 portrait; margin: 1.5cm; } 
                @media print { 
                    body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } 
                }
                body { font-family: Arial, sans-serif; font-size: 8pt; color: #000; margin: 0; padding: 0; box-sizing: border-box; }
                .container { width: 100%; }
                .header-area { margin-bottom: 10px; }
                .table-area { margin-bottom: 20px; }
                table.main-table { border-collapse: collapse; width: 100%; font-size: 8pt; text-align: center; }
                table.main-table th, table.main-table td { border: 1px solid black; padding: 4px 2px; }
                table.main-table th { font-weight: bold; }
                .bg-blue { background-color: #d9e1f2 !important; }
                .bg-green { background-color: #e2efda !important; }
                .bg-yellow { background-color: #fff2cc !important; }
                .bg-red { background-color: #fce4d6 !important; }
                .signature-area { display:flex; justify-content:space-between; font-size:9pt; margin-top: 30px; padding: 0 10px; page-break-inside: avoid; }
            </style></head><body>
            <div class="container">
                ${headerHTML}
                <div class="table-area">
                    <table class="main-table">
                        <thead>
                            <tr><th rowspan="2" style="width:25px;">NO</th><th rowspan="2">NAMA SISWA</th><th rowspan="2" style="width:25px;">L/P</th><th colspan="${uniqueDates.length||1}" class="bg-blue">BULAN / TANGGAL</th><th rowspan="2" class="bg-green" style="width:25px;">S</th><th rowspan="2" class="bg-yellow" style="width:25px;">I</th><th rowspan="2" class="bg-red" style="width:25px;">A</th></tr>
                            <tr><th class="bg-blue">${dateHeaders}</th></tr>
                        </thead>
                        <tbody>${trs}${totalHTML}</tbody>
                    </table>
                </div>
                <div class="signature-area">
                    <div style="text-align:left;"><div>Mengetahui</div><div>Kepala SMP Negeri 1 Dawan</div><div style="margin-top:55px; font-weight:bold; text-decoration:underline;">Ni Kadek Yadnyani, S.Pd</div><div>NIP. 19791016 200604 2 006</div></div>
                    <div style="text-align:left;"><div>Dawan, ${new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</div><div>Guru ${state.currentUser.mapel}</div><div style="margin-top:55px; font-weight:bold; text-decoration:underline;">${state.currentUser.nama}</div><div>NIP. ${state.currentUser.nip}</div></div>
                </div>
            </div>
            <script>
                // Eksekusi print setelah gambar kop benar-benar ter-load
                Promise.all(Array.from(document.images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    });
                })).then(() => {
                    setTimeout(() => window.print(), 300);
                });
            <\/script>
            </body></html>`);
            printWindow.document.close();
        }

        function renderInputAbsensi() {
            let optKls = kelasList.filter(k=>k!=='Kegiatan Umum'&&k!=='Istirahat').map(k=>`<option value="${k}">${k}</option>`).join('');
            let optThn = tahunList.map(t=>`<option value="${t}">${t}</option>`).join('');
            return `
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border p-6 lg:p-8">
                <div class="flex items-center justify-between mb-6 border-b pb-4"><h2 class="text-xl font-bold">Input Absensi Kelas</h2><button onclick="navigate('absensi')" class="text-gray-500"><i class="fas fa-times"></i></button></div>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                    <div><label class="block text-sm font-semibold mb-1">Tanggal</label><input type="date" id="iaTgl" required value="${new Date().toISOString().split('T')[0]}" class="w-full border rounded-lg p-2.5 bg-white outline-none"></div>
                    <div><label class="block text-sm font-semibold mb-1">Tahun Pelajaran</label><select id="iaThn" class="w-full border rounded-lg p-2.5 bg-white"><option value="">-Pilih-</option>${optThn}</select></div>
                    <div><label class="block text-sm font-semibold mb-1">Kelas</label><select id="iaKls" class="w-full border rounded-lg p-2.5 bg-white"><option value="">-Pilih-</option>${optKls}</select></div>
                    <div><label class="block text-sm font-semibold mb-1">Semester</label><select id="iaSem" class="w-full border rounded-lg p-2.5 bg-white"><option value="">-Pilih-</option><option value="Ganjil">Ganjil</option><option value="Genap">Genap</option></select></div>
                    <div class="flex items-end"><button onclick="generateFormAbsensi()" class="w-full bg-gray-800 text-white font-bold py-2.5 px-4 rounded-lg shadow hover:bg-gray-900 transition-colors">Tampilkan</button></div>
                </div>
                <div id="areaFormAbsensi"></div>
            </div>`;
        }

        function generateFormAbsensi() {
            const tgl = document.getElementById('iaTgl').value;
            const t = document.getElementById('iaThn').value; const k = document.getElementById('iaKls').value; const s = document.getElementById('iaSem').value;
            if(!tgl || !t || !k || !s) return Swal.fire('Oops','Silakan lengkapi Tanggal, Tahun, Kelas, dan Semester!','warning');
            let sisList = state.siswa.filter(x => x.tahun === t && x.kelas === k);
            if(sisList.length === 0) return document.getElementById('areaFormAbsensi').innerHTML = '<p class="text-center text-red-500 p-8 border rounded-lg bg-red-50">Data siswa tidak ditemukan untuk Kelas & Tahun tersebut.</p>';
            
            let html = `<form onsubmit="simpanBatchAbsen(event, '${t}', '${k}', '${s}')"><div class="overflow-x-auto pb-4"><table class="w-full text-left border-collapse min-w-[600px] mb-4"><thead class="bg-gray-100"><tr><th class="p-3 border w-10 text-center">No</th><th class="p-3 border">Nama Siswa</th><th class="p-3 border text-center whitespace-nowrap">Kehadiran (Hadir / Sakit / Ijin / Alpha)</th></tr></thead><tbody>`;
            sisList.forEach((sis, idx) => {
                // Merubah name="abs_${sis.id}" menjadi name="abs_${sis.nisn}" agar radio button unik dan tidak bertabrakan antar siswa
                html += `<tr><td class="p-2 border text-center">${idx+1}</td><td class="p-2 border font-medium">${sis.nama}</td><td class="p-2 border text-center">
                    <label class="mx-2 cursor-pointer font-bold text-green-600"><input type="radio" name="abs_${sis.nisn}" value="Hadir" checked class="mr-1" onchange="hitungRekap()">H</label>
                    <label class="mx-2 cursor-pointer font-bold text-yellow-600"><input type="radio" name="abs_${sis.nisn}" value="Sakit" class="mr-1" onchange="hitungRekap()">S</label>
                    <label class="mx-2 cursor-pointer font-bold text-blue-600"><input type="radio" name="abs_${sis.nisn}" value="Ijin" class="mr-1" onchange="hitungRekap()">I</label>
                    <label class="mx-2 cursor-pointer font-bold text-red-600"><input type="radio" name="abs_${sis.nisn}" value="Alpha" class="mr-1" onchange="hitungRekap()">A</label>
                    <input type="hidden" name="sisIdAbs" value="${sis.nisn}">
                </td></tr>`;
            });
            html += `</tbody></table></div>
                <div class="bg-blue-50 p-4 rounded-xl mb-6 border border-blue-100 grid grid-cols-4 text-center divide-x divide-blue-200 shadow-inner">
                    <div class="font-bold text-gray-700">Hadir: <span id="r_H" class="text-green-600 text-xl ml-1">${sisList.length}</span></div>
                    <div class="font-bold text-gray-700">Sakit: <span id="r_S" class="text-yellow-600 text-xl ml-1">0</span></div>
                    <div class="font-bold text-gray-700">Ijin: <span id="r_I" class="text-blue-600 text-xl ml-1">0</span></div>
                    <div class="font-bold text-gray-700">Alpha: <span id="r_A" class="text-red-600 text-xl ml-1">0</span></div>
                </div>
                <button type="submit" class="bg-blue-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg hover:bg-blue-700 w-full text-lg"><i class="fas fa-save mr-2"></i>Simpan Rekap Absensi</button>
            </form>`;
            document.getElementById('areaFormAbsensi').innerHTML = html;
        }

        window.hitungRekap = function() {
            let h=0, s=0, i=0, a=0;
            document.querySelectorAll('input[type="radio"]:checked').forEach(r => { if(r.value==='Hadir') h++; else if(r.value==='Sakit') s++; else if(r.value==='Ijin') i++; else if(r.value==='Alpha') a++; });
            document.getElementById('r_H').innerText = h; document.getElementById('r_S').innerText = s; document.getElementById('r_I').innerText = i; document.getElementById('r_A').innerText = a;
        }

        window.simpanBatchAbsen = async function(e, thn, kls, sem) {
            e.preventDefault(); const tgl = document.getElementById('iaTgl').value; let payload = []; let formsis = document.querySelectorAll('input[name="sisIdAbs"]');
            formsis.forEach(inp => { 
                let sNisn = inp.value; 
                let sis = state.siswa.find(x => x.nisn === sNisn); 
                let stat = document.querySelector(`input[name="abs_${sNisn}"]:checked`).value; 
                payload.push({ tgl: tgl, tahun: thn, semester: sem, kelas: kls, nisn: sis.nisn, nama: sis.nama, status_kehadiran: stat, nipGuru: state.currentUser.nip }); 
            });
            showLoading(); try { await apiCall('saveBatchAbsen', payload); closeLoading(); Swal.fire('Berhasil','Absensi satu kelas tersimpan.','success'); document.getElementById('areaFormAbsensi').innerHTML = ''; navigate('absensi'); } catch(err){closeLoading();}
        }

            let filtered = state.nilai.filter(n => { let mKls = fKelas ? n.kelas === fKelas : true; let mThn = fTahun ? n.tahun === fTahun : true; let mSem = fSem ? n.semester === fSem : true; let mNam = (n.nama || '').toLowerCase().includes(fNama); return mKls && mThn && mSem && mNam; });
            let optKls = kelasList.filter(k=>k!=='Kegiatan Umum'&&k!=='Istirahat').map(k=>`<option value="${k}" ${fKelas===k?'selected':''}>${k}</option>`).join(''); let optThn = tahunList.map(t=>`<option value="${t}" ${fTahun===t?'selected':''}>${t}</option>`).join('');
            
            let tbody = filtered.map((n, i) => `<tr class="border-b hover:bg-gray-50"><td class="p-3 text-center text-sm">${i+1}</td><td class="p-3 text-sm font-medium">${n.nama}</td><td class="p-3 text-sm text-center">${n.kelas}</td><td class="p-3 text-sm text-center">${n.semester}</td><td class="p-3 text-sm text-center font-bold text-blue-700">${n.mapel}</td><td class="p-3 text-sm text-center"><span class="bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs font-bold">${n.kategori || 'TP'}</span></td><td class="p-3 text-sm text-center text-lg font-bold ${n.nilai<75?'text-red-600':'text-green-600'}">${n.nilai}</td></tr>`).join('');

            return `
            <div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold text-gray-800">Data Nilai Siswa</h1>${state.currentUser.role==='Guru'?`<button onclick="navigate('inputNilai')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow"><i class="fas fa-edit mr-2"></i>Input Nilai</button>`:''}</div>
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4 grid grid-cols-2 md:grid-cols-5 gap-4 items-end border border-gray-100">
                <div><label class="text-xs text-gray-500">Tahun Pelajaran</label><select id="fnThn" class="w-full border rounded p-2 text-sm"><option value="">Semua</option>${optThn}</select></div>
                <div><label class="text-xs text-gray-500">Kelas</label><select id="fnKls" class="w-full border rounded p-2 text-sm"><option value="">Semua</option>${optKls}</select></div>
                <div><label class="text-xs text-gray-500">Semester</label><select id="fnSem" class="w-full border rounded p-2 text-sm"><option value="">Semua</option><option value="Ganjil" ${fSem==='Ganjil'?'selected':''}>Ganjil</option><option value="Genap" ${fSem==='Genap'?'selected':''}>Genap</option></select></div>
                <div><label class="text-xs text-gray-500">Nama Siswa</label><input type="text" id="fnNama" value="${fNama}" class="w-full border rounded p-2 text-sm" placeholder="Ketik..."></div>
                <div class="flex gap-2">
                    <button onclick="render()" class="bg-gray-800 text-white w-10 h-10 rounded-lg shadow hover:bg-gray-900 flex items-center justify-center transition-colors" title="Filter Data"><i class="fas fa-search"></i></button>
                    <button onclick="document.getElementById('fnKls').value=''; document.getElementById('fnThn').value=''; document.getElementById('fnSem').value=''; document.getElementById('fnNama').value=''; render();" class="bg-gray-200 text-gray-700 w-10 h-10 rounded-lg shadow hover:bg-gray-300 flex items-center justify-center transition-colors" title="Reset Filter"><i class="fas fa-undo"></i></button>
                    <button onclick="cetakNilai()" class="bg-green-600 text-white w-10 h-10 rounded-lg shadow hover:bg-green-700 flex items-center justify-center transition-colors" title="Cetak Nilai"><i class="fas fa-print"></i></button>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100"><div class="overflow-x-auto overflow-y-auto max-h-[60vh] pb-4"><table class="w-full text-left border-collapse min-w-[900px]"><thead class="bg-gray-50 text-gray-700 sticky top-0 shadow-sm"><tr><th class="p-3 border-b text-center w-10 whitespace-nowrap">No</th><th class="p-3 border-b whitespace-nowrap">Nama Siswa</th><th class="p-3 border-b text-center whitespace-nowrap">Kelas</th><th class="p-3 border-b text-center whitespace-nowrap">Semester</th><th class="p-3 border-b text-center whitespace-nowrap">Mata Pelajaran</th><th class="p-3 border-b text-center whitespace-nowrap">Kategori</th><th class="p-3 border-b text-center whitespace-nowrap">Nilai (0-100)</th></tr></thead><tbody>${tbody || `<tr><td colspan="7" class="p-12 text-center text-gray-500"><i class="fas fa-inbox text-4xl mb-3 text-gray-300 block"></i><p class="font-semibold text-lg">Belum ada rekam nilai.</p><p class="text-sm mt-1">Silakan klik tombol <b>"Input Nilai"</b> di atas untuk mencatat nilai siswa.</p></td></tr>`}</tbody></table></div></div>`;
        }

        function cetakNilai() {
            const fKelas = document.getElementById('fnKls')?.value || '';
            const fTahun = document.getElementById('fnThn')?.value || '';
            const fSem = document.getElementById('fnSem')?.value || '';

            if(!fKelas || !fTahun || !fSem) {
                return Swal.fire('Informasi', 'Mohon pilih Filter "Tahun Pelajaran", "Kelas", dan "Semester" terlebih dahulu agar cetakan rapi!', 'info');
            }

            let students = state.siswa.filter(s => s.kelas === fKelas && s.tahun === fTahun);
            students.sort((a,b) => a.nama.localeCompare(b.nama));
            if(students.length === 0) return Swal.fire('Kosong', 'Tidak ada siswa di kelas tersebut', 'warning');

            let filteredNilai = state.nilai.filter(n => n.kelas === fKelas && n.tahun === fTahun && n.semester === fSem);
            
            // Extract unique TP dates to determine sequence (TP 1, TP 2...)
            let tpDates = [...new Set(filteredNilai.filter(n => (n.kategori||'TP') === 'TP').map(n => n.tanggal || n.tgl))].sort();
            
            // Color array for TP columns
            let tpColors = ['bg-blue-light', 'bg-orange-light', 'bg-yellow'];
            let tpHeaders = tpDates.map((_, i) => `<th class="${tpColors[i % tpColors.length]}" style="width:60px;">TP ${i+1}</th>`).join('');
            if(tpDates.length === 0) tpHeaders = `<th class="bg-blue-light" style="width:60px;">TP 1</th>`; // fallback

            let headerHTML = `
                <div class="header-area">
                    <div style="text-align:center; margin-bottom:15px; border-bottom:2px solid black; padding-bottom:10px;">
                        <img src="https://i.imghippo.com/files/UL4915SP.png" style="width:100%; max-height:80px; object-fit:contain;">
                    </div>
                    <h3 style="text-align:center; margin:0; font-size:11pt;">DAFTAR NILAI ${state.currentUser.mapel.toUpperCase()}</h3>
                    <h3 style="text-align:center; margin:0; margin-bottom:15px; font-size:11pt;">TAHUN PELAJARAN ${fTahun}</h3>
                    <table class="info-table" style="width:100%; border:none; margin-bottom:5px; font-size:10pt; font-weight:bold;">
                        <tr>
                            <td style="width:33%; border:none; text-align:left; padding:0;">Kelas : ${fKelas}</td>
                            <td style="width:33%; border:none; text-align:center; padding:0;">Mapel : ${state.currentUser.mapel}</td>
                            <td style="width:33%; border:none; text-align:right; padding:0;">Semester : ${fSem === 'Ganjil' ? '1 (Ganjil)' : '2 (Genap)'}</td>
                        </tr>
                    </table>
                </div>
            `;

            let trs = students.map((s, idx) => {
                let sumNilai = 0; let countNilai = 0;

                let tpCells = tpDates.length > 0 ? tpDates.map((d, i) => {
                    let colorClass = tpColors[i % tpColors.length];
                    let rec = filteredNilai.find(x => x.nisn === s.nisn && (x.tanggal === d || x.tgl === d) && (x.kategori||'TP') === 'TP');
                    if(rec) { sumNilai += parseInt(rec.nilai); countNilai++; }
                    return `<td class="${colorClass}">${rec ? rec.nilai : ''}</td>`;
                }).join('') : `<td class="bg-blue-light"></td>`;

                let utsRec = filteredNilai.find(x => x.nisn === s.nisn && x.kategori === 'UTS');
                if(utsRec) { sumNilai += parseInt(utsRec.nilai); countNilai++; }
                
                let uasRec = filteredNilai.find(x => x.nisn === s.nisn && x.kategori === 'UAS');
                if(uasRec) { sumNilai += parseInt(uasRec.nilai); countNilai++; }

                let avg = countNilai > 0 ? Math.round(sumNilai / countNilai) : '';

                return `<tr>
                    <td>${idx+1}</td>
                    <td style="text-align:left; padding-left:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;">${s.nama}</td>
                    <td>${s.jk || '-'}</td>
                    ${tpCells}
                    <td class="bg-blue-dark">${utsRec ? utsRec.nilai : ''}</td>
                    <td class="bg-gray-light">${uasRec ? uasRec.nilai : ''}</td>
                    <td class="bg-green font-bold">${avg}</td>
                </tr>`;
            }).join('');

            const printWindow = window.open('', '', 'height=800,width=1000');
            printWindow.document.write(`<html><head><title>Cetak Nilai - ${fKelas}</title>
            <style>
                @page { size: A4 portrait; margin: 1.5cm; } 
                @media print { body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } }
                body { font-family: Arial, sans-serif; font-size: 8pt; color: #000; margin: 0; padding: 0; box-sizing: border-box; }
                .container { width: 100%; }
                .header-area { margin-bottom: 10px; }
                .table-area { margin-bottom: 20px; }
                table.main-table { border-collapse: collapse; width: 100%; font-size: 9pt; text-align: center; }
                table.main-table th, table.main-table td { border: 1px solid black; padding: 4px 2px; }
                table.main-table th { font-weight: bold; }
                .bg-green { background-color: #dcedc8 !important; }
                .bg-yellow { background-color: #fff9c4 !important; }
                .bg-blue-light { background-color: #bbdefb !important; }
                .bg-orange-light { background-color: #ffe0b2 !important; }
                .bg-blue-dark { background-color: #9fa8da !important; }
                .bg-gray-light { background-color: #f5f5f5 !important; }
                .signature-area { display:flex; justify-content:space-between; font-size:9pt; margin-top: 30px; padding: 0 10px; page-break-inside: avoid; }
            </style></head><body>
            <div class="container">
                ${headerHTML}
                <div class="table-area">
                    <table class="main-table">
                        <thead>
                            <tr>
                                <th rowspan="2" style="width:30px;">NO</th>
                                <th rowspan="2">NAMA SISWA</th>
                                <th rowspan="2" style="width:30px;">L/P</th>
                                <th colspan="${Math.max(tpDates.length, 1) + 2}" class="bg-green">RUBRIK</th>
                                <th rowspan="2" class="bg-green" style="width:70px;">TOTAL NILAI</th>
                            </tr>
                            <tr>
                                ${tpHeaders}
                                <th class="bg-blue-dark" style="width:60px;">UTS</th>
                                <th class="bg-gray-light" style="width:60px;">UAS</th>
                            </tr>
                        </thead>
                        <tbody>${trs}</tbody>
                    </table>
                </div>
                <div class="signature-area">
                    <div style="text-align:left;"><div>Mengetahui</div><div>Kepala SMP Negeri 1 Dawan</div><div style="margin-top:60px; font-weight:bold; text-decoration:underline;">Ni Kadek Yadnyani, S.Pd</div><div>NIP. 19791016 200604 2 006</div></div>
                    <div style="text-align:left;"><div>Dawan, ${new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</div><div>Guru ${state.currentUser.mapel}</div><div style="margin-top:60px; font-weight:bold; text-decoration:underline;">${state.currentUser.nama}</div><div>NIP. ${state.currentUser.nip}</div></div>
                </div>
            </div>
            <script>
                Promise.all(Array.from(document.images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                })).then(() => { setTimeout(() => window.print(), 300); });
            <\/script>
            </body></html>`);
            printWindow.document.close();
        }

        function renderInputNilai() {
            let optKls = kelasList.filter(k=>k!=='Kegiatan Umum'&&k!=='Istirahat').map(k=>`<option value="${k}">${k}</option>`).join(''); let optThn = tahunList.map(t=>`<option value="${t}">${t}</option>`).join('');
            return `
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border p-6 lg:p-8">
                <div class="flex items-center justify-between mb-6 border-b pb-4"><h2 class="text-xl font-bold">Input Nilai Kelas (Mapel: ${state.currentUser.mapel})</h2><button onclick="navigate('nilai')" class="text-gray-500"><i class="fas fa-times"></i></button></div>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                    <div><label class="block text-sm font-semibold mb-1">Tahun Pelajaran</label><select id="inThn" class="w-full border rounded-lg p-2.5 bg-white"><option value="">-Pilih-</option>${optThn}</select></div>
                    <div><label class="block text-sm font-semibold mb-1">Kelas</label><select id="inKls" class="w-full border rounded-lg p-2.5 bg-white"><option value="">-Pilih-</option>${optKls}</select></div>
                    <div><label class="block text-sm font-semibold mb-1">Semester</label><select id="inSem" class="w-full border rounded-lg p-2.5 bg-white"><option value="">-Pilih-</option><option value="Ganjil">Ganjil</option><option value="Genap">Genap</option></select></div>
                    <div><label class="block text-sm font-semibold mb-1">Kategori Nilai</label><select id="inKat" class="w-full border rounded-lg p-2.5 bg-white"><option value="TP">Tujuan Pembelajaran (TP)</option><option value="UTS">UTS / STS</option><option value="UAS">UAS / SAS</option></select></div>
                    <div class="flex items-end"><button onclick="generateFormNilai()" class="w-full bg-gray-800 text-white font-bold py-2.5 px-4 rounded-lg shadow hover:bg-gray-900">Tampilkan</button></div>
                </div>
                <div id="areaFormNilai"></div>
            </div>`;
        }

        function generateFormNilai() {
            const t = document.getElementById('inThn').value; const k = document.getElementById('inKls').value; const s = document.getElementById('inSem').value; const kat = document.getElementById('inKat').value;
            if(!t || !k || !s) return Swal.fire('Oops','Silakan pilih Tahun, Kelas, dan Semester!','warning');
            let sisList = state.siswa.filter(x => x.tahun === t && x.kelas === k);
            if(sisList.length === 0) return document.getElementById('areaFormNilai').innerHTML = '<p class="text-center text-red-500 p-8 border rounded-lg bg-red-50">Data siswa tidak ditemukan untuk Kelas & Tahun tersebut.</p>';
            
            let html = `<form onsubmit="simpanBatchNilai(event, '${t}', '${k}', '${s}')">
                <div class="bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded-lg mb-4 text-sm font-bold"><i class="fas fa-info-circle mr-2"></i> Menginput nilai untuk kategori: ${kat}</div>
                <div class="overflow-x-auto pb-4"><table class="w-full text-left border-collapse min-w-[500px] mb-4"><thead class="bg-gray-100"><tr><th class="p-3 border w-10 text-center">No</th><th class="p-3 border">Nama Siswa</th><th class="p-3 border text-center w-32">Nilai (0-100)</th></tr></thead><tbody>`;
            // Merubah id="nil_${sis.id}" menjadi id="nil_${sis.nisn}" agar aman dan tidak memicu error ketika fungsi simpan dieksekusi
            sisList.forEach((sis, idx) => { html += `<tr><td class="p-2 border text-center">${idx+1}</td><td class="p-2 border font-medium">${sis.nama}</td><td class="p-2 border"><input type="number" id="nil_${sis.nisn}" min="0" max="100" class="w-full border rounded p-2 text-center outline-none focus:border-blue-500" required><input type="hidden" name="sisIdNilai" value="${sis.nisn}"></td></tr>`; });
            html += `</tbody></table></div><button type="submit" class="bg-blue-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg hover:bg-blue-700 w-full text-lg"><i class="fas fa-save mr-2"></i>Simpan Daftar Nilai</button></form>`;
            document.getElementById('areaFormNilai').innerHTML = html;
        }

        window.simpanBatchNilai = async function(e, thn, kls, sem) {
            e.preventDefault(); const tgl = new Date().toISOString().split('T')[0]; const kat = document.getElementById('inKat').value; let payload = []; let formsis = document.querySelectorAll('input[name="sisIdNilai"]');
            formsis.forEach(inp => { 
                let sNisn = inp.value; 
                let sis = state.siswa.find(x => x.nisn === sNisn); 
                let val = document.getElementById(`nil_${sNisn}`).value; 
                if(val !== '') payload.push({ tgl: tgl, tahun: thn, semester: sem, kelas: kls, nisn: sis.nisn, nama: sis.nama, nilai: val, nipGuru: state.currentUser.nip, mapel: state.currentUser.mapel, kategori: kat }); 
            });
            if(payload.length === 0) return Swal.fire('Info', 'Tidak ada nilai yang diinput', 'info');
            showLoading(); try { await apiCall('saveBatchNilai', payload); closeLoading(); Swal.fire('Berhasil','Nilai satu kelas tersimpan.','success'); document.getElementById('areaFormNilai').innerHTML = ''; navigate('nilai'); } catch(err){closeLoading();}
        }

        function viewImage(src) { Swal.fire({ imageUrl: src, imageAlt: 'Foto', width: 600, showConfirmButton: false, showCloseButton: true }); }

        window.onload = () => { render(); };
    </script>
</body>
</html>
